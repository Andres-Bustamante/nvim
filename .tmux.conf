# Carga TPM
set -g @plugin 'tmux-plugins/tpm'

# Tested options for TMUX compatibility
set -g @plugin 'tmux-plugins/tmux-sensible'

# Clipboard management
set -g @plugin 'tmux-plugins/tmux-yank'

# Tmux Navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Tmux Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Which Key
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @plugin 'vascomfnunes/tmux-kripto'

# set -g @kripto_id "ethereum"
set -g @kripto_id "ETHUSDT"
set -g @kripto_ttl 1
set -g @kripto_icon " "

# Floating window
bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  # open in the same directory of the current pane
  display-popup -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}

# switch windows alt+number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# open new window in the same directory of the current pane
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Tema Kanagawa
set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @kanagawa-theme "dragon"  # Options are 'dragon', 'wave', 'light' or 'classic'

set -g @kanagawa-plugins "git cpu-usage ram-usage custom:kripto.sh"
set -g @kanagawa-custom-plugin-colors "sakura_pink dark_gray"

# set -g @kanagawa-show-left-sep 
# set -g @kanagawa-show-right-sep 


set -g @kanagawa-show-left-sep 
set -g @kanagawa-show-right-sep 

set -g @kanagawa-show-empty-plugins true

set -g @kanagawa-show-powerline true
set -g @kanagawa-ignore-window-colors true


# set -g @plugin 'rose-pine/tmux'
# set -g @rose_pine_variant 'moon' # Options are 'main', 'moon' or 'dawn'

# set -g window-status-format '#I #W'
# set -g window-status-current-format '#[fg=#c8d3f5,bg=#1f1f28]#[fg=#c8d3f5,bg=#1f1f28] #I #[fg=#c8d3f5,bg=#1f1f28]'

# --- terminal & key handling ---
# set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",*:Tc"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:RGB'
set -ga terminal-overrides ',tmux-256color:RGB'

set -s extended-keys on

# Modo vim
set -g mode-keys vi
if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# Keymaps
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"

# Mouse support
set -g mouse on

# Status bar position
set -g status-position top

# Kill all sessions except current
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Fix index
set -g base-index 1
setw -g pane-base-index 1

# TPM init
run -b  '~/.tmux/plugins/tpm/tpm'
